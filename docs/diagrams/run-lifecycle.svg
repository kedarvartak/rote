<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="650" viewBox="0 0 1320 650" role="img" aria-labelledby="title desc">
<title id="title">Run lifecycle — cold exploration becomes verified browser memory</title><desc id="desc">The economic claim is measured at success parity; verification is the irreducible floor</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker></defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="50%" y="52" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="750">Run lifecycle — cold exploration becomes verified browser memory</text>
<text x="50%" y="82" text-anchor="middle" fill="#5f6b7a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">The economic claim is measured at success parity; verification is the irreducible floor</text>
<rect x="60" y="170" width="340" height="300" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><text x="230" y="242" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700"><tspan x="230" dy="0">COLD · RUN 1</tspan><tspan x="230" dy="26"></tspan><tspan x="230" dy="26">Frontier agent explores</tspan><tspan x="230" dy="26">Recorder captures all calls</tspan><tspan x="230" dy="26">Successful run is distilled</tspan><tspan x="230" dy="26"></tspan><tspan x="230" dy="26">Output: trajectory → playbook v1</tspan></text>
<rect x="490" y="170" width="340" height="300" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/><text x="660" y="242" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700"><tspan x="660" dy="0">WARM · RUN N</tspan><tspan x="660" dy="26"></tspan><tspan x="660" dy="26">Fingerprint + task match</tspan><tspan x="660" dy="26">Executor replays essential DAG</tspan><tspan x="660" dy="26">Expect + verify gates run</tspan><tspan x="660" dy="26"></tspan><tspan x="660" dy="26">Output: confidence observation</tspan></text>
<rect x="920" y="170" width="340" height="300" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/><text x="1090" y="242" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700"><tspan x="1090" dy="0">DRIFT · RUN N+k</tspan><tspan x="1090" dy="26"></tspan><tspan x="1090" dy="26">Assertion detects change</tspan><tspan x="1090" dy="26">Retry or scoped repair</tspan><tspan x="1090" dy="26">Fallback re-explores if needed</tspan><tspan x="1090" dy="26"></tspan><tspan x="1090" dy="26">Output: patch → playbook vN+1</tspan></text>
<line x1="400" y1="320" x2="490" y2="320" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="445" y="311" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">learn</text>
<line x1="830" y1="320" x2="920" y2="320" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="875" y="311" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">site changes</text>
<text x="660" y="540" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700"><tspan x="660" dy="0">Model control: every step  →  slots/repair only  →  one failed step or full fallback</tspan></text>
<text x="660" y="585" text-anchor="middle" fill="#5f6b7a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="500"><tspan x="660" dy="0">Cost trends toward match + essential actions + verification — never toward unverified zero.</tspan></text>
</svg>
