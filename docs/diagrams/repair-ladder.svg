<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
<title id="title">Recovery ladder — escalate narrowly, never report unverified success</title><desc id="desc">Current executor supports retry and clean fallback; scoped repair and persisted patches are planned</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker></defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="50%" y="52" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="750">Recovery ladder — escalate narrowly, never report unverified success</text>
<text x="50%" y="82" text-anchor="middle" fill="#5f6b7a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Current executor supports retry and clean fallback; scoped repair and persisted patches are planned</text>
<rect x="70" y="150" width="220" height="95" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><text x="180" y="197.5" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="180" dy="0">Execute step k</tspan></text>
<rect x="385" y="145" width="230" height="105" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/><text x="500" y="197.5" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="500" dy="0">expect passes?</tspan></text>
<rect x="715" y="150" width="220" height="95" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/><text x="825" y="197.5" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="825" dy="0">Continue DAG</tspan></text>
<rect x="1030" y="145" width="220" height="105" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/><text x="1140" y="185.8" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="1140" dy="0">final verify[]</tspan><tspan x="1140" dy="23.400000000000002">passes?</tspan></text>
<line x1="290" y1="198" x2="385" y2="198" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="615" y1="198" x2="715" y2="198" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="665" y="189" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">yes</text>
<line x1="935" y1="198" x2="1030" y2="198" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="1140" y1="250" x2="1140" y2="325" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1140" y="278.5" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">no</text>
<rect x="990" y="325" width="300" height="90" rx="14" fill="#e2e8f0" stroke="#64748b" stroke-width="2.5"/><text x="1140" y="358.3" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="1140" dy="0">Retry transient failure</tspan><tspan x="1140" dy="23.400000000000002">within fixed policy</tspan></text>
<line x1="500" y1="250" x2="500" y2="325" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="500" y="278.5" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">no</text>
<rect x="350" y="325" width="300" height="90" rx="14" fill="#e2e8f0" stroke="#64748b" stroke-width="2.5"/><text x="500" y="358.3" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="500" dy="0">Retry transient failure</tspan><tspan x="500" dy="23.400000000000002">within fixed policy</tspan></text>
<rect x="350" y="475" width="300" height="100" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="10 7"/><text x="500" y="513.3" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="500" dy="0">Scoped repair</tspan><tspan x="500" dy="23.400000000000002">narrow context · patch one step</tspan></text>
<rect x="775" y="475" width="300" height="100" rx="14" fill="#ffe4e6" stroke="#e11d48" stroke-width="2.5"/><text x="925" y="513.3" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="925" dy="0">Full-agent fallback</tspan><tspan x="925" dy="23.400000000000002">record successful replacement run</tspan></text>
<line x1="500" y1="415" x2="500" y2="475" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="500" y="436" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">still fails</text>
<line x1="650" y1="525" x2="775" y2="525" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="712.5" y="516" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">repair fails</text>
<line x1="1140" y1="415" x2="925" y2="475" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1032.5" y="436" text-anchor="middle" fill="#8b97a8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">still fails</text>
<rect x="775" y="635" width="300" height="80" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="10 7"/><text x="925" y="675" text-anchor="middle" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"><tspan x="925" dy="0">Re-distill + append vN+1</tspan></text>
<line x1="925" y1="575" x2="925" y2="635" stroke="#8b97a8" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="1140" y1="145" x2="1140" y2="90" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1140" y="108.5" text-anchor="middle" fill="#16a34a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">yes → success</text>
<text x="70" y="690" text-anchor="start" fill="#172033" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700"><tspan x="70" dy="0">Invariant: a failed expectation or final verification can never become success.</tspan></text>
