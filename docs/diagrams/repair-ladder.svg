<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img">
<defs>
  <filter id="rough" x="-3%" y="-3%" width="106%" height="106%"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="1" seed="7" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7"/></filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker>
</defs>
<rect width="1200" height="900" fill="#ffffff"/>
<text x="220" y="63" text-anchor="start" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="28" font-weight="600"><tspan x="220" dy="0">Recovery ladder: escalate narrowly, never report false success</tspan></text>
<text x="300" y="91" text-anchor="start" fill="#757575" font-family="Virgil, Segoe Print, cursive" font-size="16" font-weight="600"><tspan x="300" dy="0">Solid = executor now     Dashed = planned scoped repair + patching</tspan></text>
<rect x="45" y="160" width="190" height="85" rx="14" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="140" y="210" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="20" font-weight="600"><tspan x="140" dy="0">Execute step k</tspan></text>
<polygon points="390,140 480,202.5 390,265 300,202.5" fill="#fff3bf" stroke="#f59e0b" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="390" y="198" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="18" font-weight="600"><tspan x="390" dy="0">expect</tspan><tspan x="390" dy="22.5">passes?</tspan></text>
<rect x="545" y="160" width="190" height="85" rx="14" fill="#b2f2bb" stroke="#22c55e" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="640" y="210" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="20" font-weight="600"><tspan x="640" dy="0">Continue DAG</tspan></text>
<polygon points="890,140 980,202.5 890,265 800,202.5" fill="#fff3bf" stroke="#f59e0b" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="890" y="198" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="18" font-weight="600"><tspan x="890" dy="0">final verify[]</tspan><tspan x="890" dy="22.5">passes?</tspan></text>
<rect x="1025" y="160" width="130" height="85" rx="14" fill="#b2f2bb" stroke="#22c55e" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="1090" y="209.25" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="18" font-weight="600"><tspan x="1090" dy="0">SUCCESS</tspan></text>
<polyline points="235,202 300,202" fill="none" stroke="#1e1e1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="480,202 545,202" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="512.5" y="187.25" text-anchor="middle" fill="#22c55e" font-family="Virgil, Segoe Print, cursive" font-size="14" font-weight="600"><tspan x="512.5" dy="0">yes</tspan></text>
<polyline points="735,202 800,202" fill="none" stroke="#1e1e1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="980,202 1025,202" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="1002.5" y="187.25" text-anchor="middle" fill="#22c55e" font-family="Virgil, Segoe Print, cursive" font-size="14" font-weight="600"><tspan x="1002.5" dy="0">yes</tspan></text>
<rect x="270" y="350" width="240" height="95" rx="14" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="390" y="381.75" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="18" font-weight="600"><tspan x="390" dy="0">1. RETRY</tspan><tspan x="390" dy="22.5">transient failure</tspan><tspan x="390" dy="22.5">fixed attempt policy</tspan></text>
<polyline points="390,265 390,350" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="390" y="292.75" text-anchor="middle" fill="#ef4444" font-family="Virgil, Segoe Print, cursive" font-size="14" font-weight="600"><tspan x="390" dy="0">no</tspan></text>
<rect x="270" y="520" width="240" height="110" rx="14" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="10 7" opacity="1" filter="url(#rough)"/>
<text x="390" y="559.25" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="18" font-weight="600"><tspan x="390" dy="0">2. SCOPED REPAIR</tspan><tspan x="390" dy="22.5">narrow failure context</tspan><tspan x="390" dy="22.5">patch only step k</tspan></text>
<polyline points="390,445 390,520" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="390" y="467.75" text-anchor="middle" fill="#8b5cf6" font-family="Virgil, Segoe Print, cursive" font-size="14" font-weight="600"><tspan x="390" dy="0">still fails</tspan></text>
<rect x="650" y="520" width="270" height="110" rx="14" fill="#ffc9c9" stroke="#ef4444" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="785" y="536.75" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="18" font-weight="600"><tspan x="785" dy="0">3. FULL-AGENT FALLBACK</tspan><tspan x="785" dy="22.5">fresh run on original</tspan><tspan x="785" dy="22.5">task</tspan><tspan x="785" dy="22.5">record replacement</tspan><tspan x="785" dy="22.5">trajectory</tspan></text>
<polyline points="510,575 650,575" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="580" y="560.25" text-anchor="middle" fill="#ef4444" font-family="Virgil, Segoe Print, cursive" font-size="14" font-weight="600"><tspan x="580" dy="0">repair fails</tspan></text>
<polyline points="890,265 785,520" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="837.5" y="377.75" text-anchor="middle" fill="#ef4444" font-family="Virgil, Segoe Print, cursive" font-size="14" font-weight="600"><tspan x="837.5" dy="0">verify fails</tspan></text>
<rect x="650" y="700" width="270" height="80" rx="14" fill="#c3fae8" stroke="#06b6d4" stroke-width="2" stroke-dasharray="10 7" opacity="1" filter="url(#rough)"/>
<text x="785" y="724.25" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="18" font-weight="600"><tspan x="785" dy="0">Re-distill + append vN+1</tspan><tspan x="785" dy="22.5">resume from verified</tspan><tspan x="785" dy="22.5">state</tspan></text>
<polyline points="785,630 785,700" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="150" y="815" width="900" height="55" rx="14" fill="#fff3bf" stroke="#f59e0b" stroke-width="2" opacity="1" filter="url(#rough)"/>
<text x="600" y="850" text-anchor="middle" fill="#1e1e1e" font-family="Virgil, Segoe Print, cursive" font-size="20" font-weight="600"><tspan x="600" dy="0">Invariant: failed expectation or final verification can never become success.</tspan></text>
</svg>
