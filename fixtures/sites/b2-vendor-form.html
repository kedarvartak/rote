<!doctype html>
<html>
  <head><title>Vendor Registration</title></head>
  <body>
    <main>
      <h1>Vendor Registration</h1>
      <form id="registration-form">
        <label for="company-name">Company name</label>
        <input id="company-name" name="company_name" />
        <label for="contact-email">Contact email</label>
        <input id="contact-email" name="contact_email" type="email" />
        <label for="tax-id">Tax ID</label>
        <input id="tax-id" name="tax_id" />
        <label for="address-line1">Address line 1</label>
        <input id="address-line1" name="address_line1" />
        <label for="city">City</label>
        <input id="city" name="city" />
        <label for="postal-code">Postal code</label>
        <input id="postal-code" name="postal_code" />
        <label for="country">Country</label>
        <select id="country" name="country"><option>US</option></select>
        <label for="phone">Phone</label>
        <input id="phone" name="phone" />
        <button id="registration-submit" type="submit">Submit registration</button>
      </form>
    </main>
  </body>
</html>
