<!doctype html>
<html>
  <head><title>Catalog Search</title></head>
  <body>
    <main>
      <h1>Catalog</h1>
      <form id="search-form">
        <label for="catalog-query">Search catalog</label>
        <input id="catalog-query" name="query" placeholder="Search products" />
        <button id="catalog-search-submit" type="submit">Search</button>
      </form>
      <section id="catalog-results" aria-label="Catalog results">
        <article><h2>Alpha result</h2><button id="open-alpha">Open Alpha</button></article>
        <article><h2>Beta result</h2><button id="open-beta">Open Beta</button></article>
      </section>
    </main>
  </body>
</html>
